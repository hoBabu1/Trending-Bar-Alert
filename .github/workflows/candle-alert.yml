name: Candle Streak Alert

on:
  schedule:
    # Runs ~every 30 min at off-peak minutes (7 & 37). Avoid :00 / :30, which
    # are the most congested minutes on GitHub and get delayed or dropped.
    - cron: "7,37 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Needed so the job can commit the updated alert_state.json back to the repo.
permissions:
  contents: write

# Prevent overlapping runs from racing on the state file.
concurrency:
  group: candle-alert
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run candle scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python candle_alert_bot.py --once

      - name: Persist alert state
        run: |
          if [ -n "$(git status --porcelain alert_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add alert_state.json
            git commit -m "chore: update alert state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
